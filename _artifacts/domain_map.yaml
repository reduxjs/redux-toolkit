      - library: 'react-redux'
        skill: 'modern-redux'

  - name: 'Redux Dataflow'
    slug: 'redux-dataflow'
    domain: 'build-modern-redux-apps'
    description: 'Explain and apply the Redux action, reducer, selector, and render data flow so architectural choices and debugging stay predictable.'
    type: 'core'
    packages:
      - '@reduxjs/toolkit'
    covers:
      - 'single store'
      - 'actions'
      - 'reducers'
      - 'selectors'
      - 'state machines'
      - 'event-style actions'
      - 'reducer-owned state transitions'
    tasks:
      - 'Explain how data moves from UI events to reducers and back to the UI'
      - 'Choose whether new data should be derived or stored'
      - 'Decide whether a transition belongs in a reducer or at an authoritative external source boundary'
      - 'Model reducer transitions so invalid states are impossible'
    failure_modes:
      - mistake: 'Mutating selected state outside reducers'
        mechanism: 'Changing objects read from the store breaks immutability assumptions and leads to stale UI or DevTools history that no longer matches reality.'
        wrong_pattern: |
          const post = useAppSelector((state) => state.posts.entities[id])
          post.title = title
          dispatch(postSaved(post))
        correct_pattern: |
          dispatch(postUpdated({ id, title }))
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; docs/usage/immer-reducers.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current invariant; this remains the most common Redux bug pattern.'
      - mistake: 'Using setter-style actions instead of event-style actions'
        mechanism: 'Setter actions like setPosts hide what actually happened in the UI and encourage callers to calculate the next state themselves. Redux actions should describe events, and reducers should translate those events into state changes.'
        wrong_pattern: |
          const nextPosts = [...posts, newPost]
          dispatch(setPosts(nextPosts))
        correct_pattern: |
          dispatch(postAdded(newPost))
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; event-style actions make Redux timelines and reducer logic easier to understand and debug.'
      - mistake: 'Combining store state with new external data before dispatch'
        mechanism: 'If the next state depends on both existing store data and new outside input, the reducer should own that combination logic. Full replacement is fine when the payload is an authoritative external snapshot, but mixed transitions belong in reducers.'
        wrong_pattern: |
          const currentPosts = selectPosts(store.getState())
          const mergedPosts = mergeById(currentPosts, incomingPosts)
          dispatch(postsReplaced(mergedPosts))
        correct_pattern: |
          dispatch(postsReceived(incomingPosts))

          postsReceived(state, action) {
            postsAdapter.upsertMany(state, action.payload)
          }
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; reducers should own transitions that mix old store state with new outside data.'
        skills:
          - 'redux-dataflow'
          - 'build-slices-and-selectors'
      - mistake: 'Ignoring current state when reducing async actions'
        mechanism: 'Reducers that only inspect action.type allow impossible transitions like success after success or stale requests overwriting newer state.'
        wrong_pattern: |
          builder.addCase(fetchPosts.fulfilled, (state, action) => {
            state.status = 'succeeded'
            state.posts = action.payload
          })
        correct_pattern: |
          builder.addCase(fetchPosts.fulfilled, (state, action) => {
            if (state.status === 'pending') {
              state.status = 'succeeded'
              state.posts = action.payload
            }
          })
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; /home/weber/tmp/redux/docs/tutorials/essentials/part-5-async-logic.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; reducers should behave like state machines when request lifecycle matters.'
      - mistake: 'Storing derived values instead of deriving them'
        mechanism: 'Keeping filtered lists or counts in state creates duplicate sources of truth that drift out of sync as features change.'
        wrong_pattern: |
          const initialState = {
            posts: [],
            visiblePosts: [],
          }
        correct_pattern: |
          export const selectVisiblePosts = createSelector(
            [selectAllPosts, selectFilter],
            (posts, filter) => posts.filter((post) => matches(post, filter)),
          )
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current guidance; agents often materialize derived state because it looks explicit.'

