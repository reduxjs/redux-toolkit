      - 'Refactor local state into a shared slice when requirements change'
    failure_modes:
      - mistake: 'Putting ordinary form editing state in Redux'
        mechanism: 'Per-keystroke form dispatches add overhead and global complexity for data that is usually only needed inside one component tree.'
        wrong_pattern: |
          const title = useAppSelector(selectDraftTitle)
          <input
            value={title}
            onChange={(e) => dispatch(titleChanged(e.target.value))}
          />
        correct_pattern: |
          const [title, setTitle] = useState('')
          <input value={title} onChange={(e) => setTitle(e.target.value)} />
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current style-guide rule; exceptions exist, but the default should be local component state.'
      - mistake: 'Synchronizing router or URL state into Redux'
        mechanism: 'When another system already owns the state, copying it into Redux creates duplicate sources of truth. URL and router state should usually stay with the router and be combined with Redux state at the component boundary or passed as selector input.'
        wrong_pattern: |
          useEffect(() => {
            dispatch(filterChanged(searchParams.get('filter') ?? 'all'))
          }, [searchParams, dispatch])
        correct_pattern: |
          const filter = searchParams.get('filter') ?? 'all'
          const posts = useAppSelector((state) =>
            selectVisiblePosts(state, filter),
          )
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; state with another authoritative source should rarely be synchronized into Redux.'
      - mistake: 'Naming state after components instead of data'
        mechanism: 'UI-shaped state like loginScreen or postsList bakes a view tree into the store and makes reuse, routing, and selector design brittle.'
        wrong_pattern: |
          const rootReducer = combineReducers({
            loginScreen: loginReducer,
            postsList: postsReducer,
          })
        correct_pattern: |
          const rootReducer = combineReducers({
            auth: authReducer,
            posts: postsReducer,
          })
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; this usually appears when Redux is introduced from the component layer downward.'
      - mistake: 'Letting slice boundaries fossilize as the app evolves'
        mechanism: 'Slices that are too broad force unrelated data together, while slices that are too fragmented require constant stitching outside the reducer layer. Good slice boundaries should be revisited as access patterns change.'
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current guidance; if data is constantly stitched together outside Redux, it may belong closer together, and independent data may deserve a split.'
      - mistake: 'Blindly spreading payloads into state'
        mechanism: 'Reducers that return action payloads or spread them wholesale give up ownership of state shape and silently accept malformed data.'
        wrong_pattern: |
          userLoggedIn(state, action) {
            return { ...state, ...action.payload }
          }
        correct_pattern: |
          userLoggedIn(state, action) {
            state.id = action.payload.id
            state.name = action.payload.name
          }
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; static typing can reduce risk but does not change the architectural tradeoff.'

  - name: 'Build Slices And Selectors'
    slug: 'build-slices-and-selectors'
    domain: 'model-redux-state'
    description: 'Author slices, selectors, lazy-injected reducers, and normalized entity state with RTK-first patterns and explicit Immer guidance.'
    type: 'core'
    packages:
      - '@reduxjs/toolkit'
    covers:
      - 'createSlice'
      - 'reducers creator callback'
      - 'create.asyncThunk'
      - 'Immer-backed reducer logic'
      - 'extraReducers'
      - 'selectors field and getSelectors'
      - 'injectInto and withLazyLoadedSlices'
      - 'prepare callbacks'
      - 'createSelector'
      - 'createEntityAdapter'
    tasks:
      - 'Create or refactor a feature slice with actions, selectors, and optional slice-local async thunks'
      - 'Use Immer-backed reducers without mutating real state or falling back to hand-written reducers'
      - 'Normalize entity collections and expose stable selectors'
      - 'Prepare slices for lazy injection with injectInto and withLazyLoadedSlices'
    reference_candidates:
      - topic: 'slice reducer patterns and selector shapes'
        reason: 'This topic spans createSlice reducer forms, selectors defined in the slice, create.asyncThunk, injectInto and withLazyLoadedSlices, entity adapters, and selector export patterns.'
    failure_modes:
      - mistake: 'Using mutating update logic outside Immer reducers'
        mechanism: 'Mutating syntax is only safe inside createSlice or createReducer; the same code in helpers or components mutates real objects.'
        wrong_pattern: |
          export function addTodo(todos, todo) {
            todos.push(todo)
            return todos
          }
        correct_pattern: |
          const todosSlice = createSlice({
            name: 'todos',
            initialState: [] as Todo[],
            reducers: {
              todoAdded(state, action) {
                state.push(action.payload)
              },
            },
          })
        source: 'docs/usage/immer-reducers.md; docs/api/createSlice.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current invariant; Immer makes the reducer case safe, not the syntax universally safe. Agents also often miss that mutation syntax is encouraged inside slice reducers.'
      - mistake: 'Writing hand-written switch reducers as the default'
        mechanism: 'Agents trained on legacy Redux still emit action constants plus switch reducers. That throws away co-located actions, selectors, and Immer-based updates even though modern RTK expects createSlice to be the normal baseline. Falling back to hand-written reducers should only happen after a measured Immer bottleneck.'
        wrong_pattern: |
          export default function todosReducer(state = initialState, action) {
            switch (action.type) {
              case 'todos/todoAdded':
                return state.concat(action.payload)
              default:
                return state
            }
          }
        correct_pattern: |
          const todosSlice = createSlice({
            name: 'todos',
            initialState,
            reducers: {
              todoAdded(state, action) {
                state.push(action.payload)
              },
            },
          })
        source: 'docs/usage/migrating-to-modern-redux.mdx; /home/weber/tmp/redux/docs/style-guide/style-guide.md; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current maintainer guidance; hand-written reducers are an exceptional escape hatch, not the default code agents should write.'
      - mistake: 'Writing RTK 1.x object syntax for extraReducers'
        mechanism: 'RTK 2 removed the object form for createReducer and createSlice.extraReducers, so older examples now generate broken upgrades.'
        wrong_pattern: |
          extraReducers: {
            [fetchPosts.fulfilled]: (state, action) => {
              state.items = action.payload
            },
          }
        correct_pattern: |
          extraReducers: (builder) => {
            builder.addCase(fetchPosts.fulfilled, (state, action) => {
              state.items = action.payload
            })
          }
        source: 'docs/usage/migrating-rtk-2.md; packages/toolkit/src/createSlice.ts'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Removed in RTK 2.0; agents trained on RTK 1.x code still emit the object form.'
      - mistake: 'Relying on entity.id when the real key is elsewhere'
        mechanism: 'createEntityAdapter defaults to entity.id, so collections with bookId or slug keys silently create broken selectors and updates unless selectId is provided.'
        wrong_pattern: |
          interface Book { bookId: string; title: string }
          const booksAdapter = createEntityAdapter<Book>()
        correct_pattern: |
          interface Book { bookId: string; title: string }
          const booksAdapter = createEntityAdapter({
            selectId: (book: Book) => book.bookId,
          })
        source: 'docs/api/createEntityAdapter.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior; only id-based entities can omit selectId.'

  - name: 'Handle Side Effects'
    slug: 'handle-side-effects'
    domain: 'orchestrate-side-effects'
    description: 'Choose between RTK Query, thunks, and listener middleware, then implement side-effectful workflows without leaking logic into reducers or components.'
    type: 'core'
    packages:
      - '@reduxjs/toolkit'
    covers:
      - 'decision boundary with RTK Query'
      - 'createAsyncThunk'
      - 'handwritten thunks'
      - 'createListenerMiddleware'
      - 'listener workflow helpers'
      - 'middleware ordering'
    tasks:
      - 'Choose the right mechanism for server cache, imperative async logic, and reactive workflows'
      - 'Write imperative async logic that needs dispatch and getState'
      - 'Respond to actions or state changes with reactive workflows'
      - 'Move non-UI logic out of components and reducers'
    reference_candidates:
      - topic: 'listener middleware workflow helpers'
        reason: 'take, condition, pause, fork, cancel, and matcher options form a dense API surface that is easy to misuse without examples.'
    failure_modes:
      - mistake: 'Running side effects inside reducers'
        mechanism: 'Reducers must stay pure; async calls, timestamps, random IDs, and other effects break time travel, replay, and predictability.'
        wrong_pattern: |
          todoSaved(state, action) {
            fetch('/api/todos', { method: 'POST' })
            state.items.push(action.payload)
          }
        correct_pattern: |
          export const saveTodo = createAsyncThunk('todos/save', async (todo) => {
            await client.post('/api/todos', todo)
            return todo
          })
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; docs/api/createAsyncThunk.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current invariant; reducers are pure even when using Immer.'
      - mistake: 'Using thunks to watch future state changes'
        mechanism: 'Polling or looping inside thunks to react to later actions fights the architecture; listeners are meant for reactive long-lived workflows.'
        wrong_pattern: |
          export const waitForSave = () => async (_dispatch, getState) => {
            while (getState().docs.status !== 'saved') {
              await delay(100)
            }
          }
        correct_pattern: |
          startAppListening({
            predicate: (_action, currentState) => currentState.docs.status === 'saved',
            effect: async () => {
              await notifySaved()
            },
          })
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; docs/api/createListenerMiddleware.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; listeners are the preferred tool for reactive action/state driven workflows.'
      - mistake: 'Appending listener middleware after the default checks'
        mechanism: 'Listener add and remove actions may contain functions, so adding the middleware after serializability checks causes avoidable warnings or failures.'
        wrong_pattern: |
          middleware: (getDefaultMiddleware) =>
            getDefaultMiddleware().concat(listenerMiddleware.middleware)
        correct_pattern: |
          middleware: (getDefaultMiddleware) =>
            getDefaultMiddleware().prepend(listenerMiddleware.middleware)
        source: 'docs/api/createListenerMiddleware.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; ordering matters because listener actions can carry functions.'

