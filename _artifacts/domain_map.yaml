    slug: 'modern-redux'
    domain: 'build-modern-redux-apps'
    description: 'Set up the standard RTK plus React-Redux architecture for a new or newly-modernized app, including the right store lifetime for SPA and SSR-heavy environments.'
    type: 'lifecycle'
    packages:
      - '@reduxjs/toolkit'
