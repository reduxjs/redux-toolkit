      - 'Establish the default app and features folder structure'
    failure_modes:
      - mistake: 'Importing the store directly into React UI components'
        mechanism: 'In React apps, direct store imports bypass the Provider and hook boundary, create hidden coupling, and make tests and refactors brittle. Some non-React integrations can read a store directly, but React components should normally go through hooks and context.'
        wrong_pattern: |
          import { store } from '@/app/store'

          export function PostsList() {
            const posts = store.getState().posts
            return <div>{posts.length}</div>
          }
        correct_pattern: |
          export function PostsList() {
            const posts = useAppSelector((state) => state.posts)
            return <div>{posts.length}</div>
          }
        source: 'docs/tutorials/essentials/part-3-data-flow.md; /home/weber/tmp/redux/docs/style-guide/style-guide.md; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current React guidance; some non-React framework code may read a store directly, but agents should not default to that in React UI code.'
      - mistake: 'Defaulting to connect() for new React code'
        mechanism: 'Legacy connect wrappers still exist, but hooks are the modern default and are simpler to type, simpler to read, and the maintainer explicitly does not want agents generating connect-based code for new usage.'
        wrong_pattern: |
          const mapState = (state) => ({ posts: selectPosts(state) })
          const mapDispatch = { postAdded }

          function PostsList({ posts, postAdded }) {
            return <button onClick={() => postAdded()}>Add</button>
          }

          export default connect(mapState, mapDispatch)(PostsList)
        correct_pattern: |
          export function PostsList() {
            const posts = useAppSelector(selectPosts)
            const dispatch = useAppDispatch()
            return <button onClick={() => dispatch(postAdded())}>Add</button>
          }
        source: 'docs/usage/migrating-to-modern-redux.mdx; /home/weber/tmp/redux/docs/style-guide/style-guide.md; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current maintainer guidance; connect may remain in legacy code, but agents should steer new React code toward hooks.'
      - mistake: 'Recreating the store during render in SSR-heavy React frameworks'
        mechanism: 'In SSR-heavy React frameworks, a module-level singleton can leak state across requests, but creating the store on every render loses client state. The store needs to be request-scoped and also stable across renders inside the client provider component.'
        wrong_pattern: |
          'use client'
          export function StoreProvider({ children }) {
            const store = makeStore()
            return <Provider store={store}>{children}</Provider>
          }
        correct_pattern: |
          'use client'
          export function StoreProvider({ children }) {
            const [store] = useState(makeStore)
            return <Provider store={store}>{children}</Provider>
          }
        source: 'docs/usage/nextjs.mdx; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance for SSR-heavy React frameworks; classic client-only SPAs can still use a module-level singleton store.'
      - mistake: 'Keeping manual createStore boilerplate as the default'
        mechanism: 'Legacy store setup works, but it silently drops RTK safety middleware and the modern default configuration unless each piece is rebuilt by hand.'
        wrong_pattern: |
          import { createStore, applyMiddleware, combineReducers } from 'redux'
          import thunk from 'redux-thunk'

          export const store = createStore(
            combineReducers({ users: usersReducer }),
            applyMiddleware(thunk),
          )
        correct_pattern: |
          import { configureStore } from '@reduxjs/toolkit'

          export const store = configureStore({
            reducer: { users: usersReducer },
          })
        source: 'docs/usage/migrating-to-modern-redux.mdx; /home/weber/tmp/redux/docs/style-guide/style-guide.md'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Still technically valid Redux, but it is no longer the recommended baseline and agents trained on pre-RTK material still generate it.'
