        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current guidance; persistence is viable for native-style environments, not the default browser path.'
      - mistake: 'Manually patching cache from arbitrary component code'
        mechanism: 'Ad-hoc cache updates drift away from request lifecycles; RTK Query expects optimistic and pessimistic updates to be coordinated inside endpoint lifecycle handlers.'
        wrong_pattern: |
          useEffect(() => {
            dispatch(api.util.updateQueryData('getPosts', undefined, patchPosts))
          }, [dispatch])
        correct_pattern: |
          addReaction: build.mutation<Post, Args>({
            query: ({ postId, reaction }) => ({ url: `posts/${postId}/reactions`, method: 'POST' }),
            async onQueryStarted({ postId, reaction }, { dispatch, queryFulfilled }) {
              const patch = dispatch(
                api.util.updateQueryData('getPosts', undefined, (draft) => {
                  const post = draft.find((item) => item.id === postId)
                  if (post) post.reactions[reaction]++
                }),
              )
              try {
                await queryFulfilled
              } catch {
                patch.undo()
              }
            },
          })
        source: 'docs/rtk-query/usage/manual-cache-updates.mdx; /home/weber/tmp/redux/docs/tutorials/essentials/part-8-rtk-query-advanced.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; lifecycle-bound cache changes scale better than component-scoped patches.'
      - mistake: 'Expecting invalidation to refetch unsubscribed queries'
        mechanism: 'Invalidation only refetches cache entries that are actively subscribed. Invalidated queries with no current subscribers are removed and will refetch when they are used again, instead of refetching data that may never be displayed.'
        source: 'docs/rtk-query/usage/automated-refetching.mdx; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior; invalidation is not a global background refresh for every cached query.'
    compositions:
      - library: 'react-redux'
        skill: 'modern-redux'
      - library: 'redux-persist'
        skill: 'adopt-rtk-query'

  - name: 'Generate RTK Query From OpenAPI'
    slug: 'generate-rtk-query-from-openapi'
    domain: 'manage-server-data'
    description: 'Generate RTK Query endpoints from an OpenAPI schema and integrate the output back into a single RTK Query architecture.'
    type: 'composition'
    packages:
      - '@reduxjs/toolkit'
      - '@rtk-query/codegen-openapi'
    covers:
      - '@rtk-query/codegen-openapi'
      - 'empty API pattern'
      - 'injectEndpoints'
      - 'endpointOverrides'
      - 'filterEndpoints'
      - 'generated hooks'
      - 'tag generation'
    tasks:
      - 'Create a codegen config for an OpenAPI schema'
      - 'Generate RTK Query endpoints into an existing API service'
      - 'Correct generated endpoint types, parameters, or tags when the schema is imperfect'
    reference_candidates:
      - topic: 'codegen config and endpoint override options'
        reason: 'Schema file inputs, output layouts, tag generation, hooks, endpoint filtering, and override matchers all change the generated surface.'
    failure_modes:
      - mistake: 'Assuming auto-generated tags are granular enough'
        mechanism: 'The tag option only generates string tags without ids, so invalidation can become overly broad unless endpoints are enhanced or overridden.'
        wrong_pattern: |
          const config = {
            schemaFile: './openapi.json',
            tag: true,
          }
        correct_pattern: |
          const config = {
            schemaFile: './openapi.json',
            tag: true,
            endpointOverrides: [
              { pattern: 'getPetById', providesTags: ['SinglePet'] },
            ],
          }
        source: 'docs/rtk-query/usage/code-generation.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior; tag generation is intentionally coarse unless you refine it.'
      - mistake: 'Generating a brand-new API slice instead of extending an empty one'
        mechanism: 'Codegen works best when it injects endpoints into a shared API service; standalone generated APIs make later composition and code splitting harder.'
        wrong_pattern: |
          export const petApi = createApi({
            baseQuery: fetchBaseQuery({ baseUrl: '/' }),
            endpoints: (build) => ({ /* generated endpoints */ }),
          })
        correct_pattern: |
          export const emptySplitApi = createApi({
            baseQuery: fetchBaseQuery({ baseUrl: '/' }),
            endpoints: () => ({}),
          })
        source: 'docs/rtk-query/usage/code-generation.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; the documented flow starts from an empty shared API.'
      - mistake: 'Trusting generated query and mutation shapes without overrides'
        mechanism: 'Real schemas are messy; if an operation is classified incorrectly or exposes the wrong parameters, codegen needs endpointOverrides rather than hand edits after the fact.'
        wrong_pattern: |
          const config = {
            schemaFile: './openapi.json',
            outputFile: './petApi.ts',
          }
        correct_pattern: |
          const config = {
            schemaFile: './openapi.json',
            outputFile: './petApi.ts',
            endpointOverrides: [
              { pattern: 'loginUser', type: 'mutation' },
            ],
          }
        source: 'docs/rtk-query/usage/code-generation.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current guidance; endpointOverrides exist because many schemas do not map cleanly to ideal endpoint shapes.'
    compositions:
      - library: 'OpenAPI'
        skill: 'generate-rtk-query-from-openapi'

  - name: 'Migrate To Modern Redux'
    slug: 'migrate-to-modern-redux'
    domain: 'evolve-and-diagnose-redux-apps'
    description: 'Move legacy Redux and React-Redux code toward current RTK-first patterns without freezing delivery.'
    type: 'lifecycle'
    packages:
      - '@reduxjs/toolkit'
      - '@reduxjs/rtk-codemods'
    covers:
      - 'configureStore migration'
      - 'createSlice migration'
      - 'hooks migration'
      - 'RTK 2 migration'
      - 'codemods'
    tasks:
      - 'Replace a legacy createStore setup with configureStore'
      - 'Convert one reducer or screen at a time to createSlice and hooks'
      - 'Apply codemods and RTK 2 migration fixes safely'
    failure_modes:
      - mistake: 'Attempting a big-bang rewrite of the whole app'
        mechanism: 'Modern Redux migration is designed to be incremental; rewriting every slice and component at once increases risk and removes a safe rollback path. Once the store is migrated, though, new work should stop introducing legacy patterns.'
        wrong_pattern: |
          // Replace every reducer, action creator, and connected component
          // in one branch before shipping anything.
        correct_pattern: |
          // 1) Switch createStore to configureStore
          // 2) When touching a legacy reducer, migrate it to createSlice
          // 3) Convert connected components to hooks as you touch them
          // 4) Repeat incrementally, but do not add new legacy Redux code
        source: 'docs/usage/migrating-to-modern-redux.mdx; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current migration guidance; legacy and modern Redux code are expected to coexist temporarily.'
      - mistake: 'Carrying removed RTK 2 configuration forms forward'
        mechanism: 'RTK 2 requires callback forms for middleware and enhancers, and removed object notation for extraReducers and createReducer.'
        wrong_pattern: |
          configureStore({
            reducer,
            middleware: [logger],
          })
        correct_pattern: |
          configureStore({
            reducer,
            middleware: (getDefaultMiddleware) =>
              getDefaultMiddleware().concat(logger),
          })
        source: 'docs/usage/migrating-rtk-2.md; packages/toolkit/src/configureStore.ts'
        priority: 'CRITICAL'
        status: 'fixed-but-legacy-risk'
        version_context: 'Removed in RTK 2.0; agents trained on RTK 1.x setup code still emit array middleware and object reducers.'
      - mistake: 'Preserving hand-written fetch lifecycle state by default'
        mechanism: 'Migration often keeps old loading booleans, thunks, and reducers even when the feature is really server cache and RTK Query can replace the whole stack.'
        wrong_pattern: |
          const initialState = { items: [], status: 'idle', error: null }
          export const fetchTodos = createAsyncThunk('todos/fetch', async () => client.get('/todos'))
        correct_pattern: |
          export const api = createApi({
            baseQuery: fetchBaseQuery({ baseUrl: '/' }),
            endpoints: (build) => ({
              getTodos: build.query<Todo[], void>({ query: () => '/todos' }),
            }),
          })
        source: 'docs/usage/migrating-to-modern-redux.mdx; /home/weber/tmp/redux/docs/style-guide/style-guide.md; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current guidance; RTK Query is the default for server-cache use cases, while createAsyncThunk remains valid for non-cache workflows.'
        skills:
          - 'migrate-to-modern-redux'
          - 'adopt-rtk-query'
          - 'handle-side-effects'
    compositions:
      - library: 'react-redux'
        skill: 'modern-redux'

  - name: 'Debug Redux Toolkit Apps'
    slug: 'debug-redux-toolkit-apps'
    domain: 'evolve-and-diagnose-redux-apps'
    description: 'Trace incorrect state, duplicate requests, cache bugs, and render churn back to the underlying RTK or RTK Query mechanism.'
    type: 'lifecycle'
    packages:
      - '@reduxjs/toolkit'
    covers:
      - 'Redux DevTools'
      - 'serializability and immutability checks'
      - 'React StrictMode request duplication'
      - 'React-Redux subscription granularity'
      - 'RTK Query reducerPath conflicts'
      - 'selector and hook stability'
    tasks:
      - 'Investigate duplicate network requests or repeated cache writes'
      - 'Interpret serializable and immutable-state warnings'
      - 'Reduce unnecessary rerenders from selectors or query hooks'
    failure_modes:
      - mistake: 'Dispatching fetch thunks from effects without a thunk-level guard'
        mechanism: 'React StrictMode can run mount effects twice in development, so component checks alone may still dispatch duplicate requests before render catches up.'
        wrong_pattern: |
          useEffect(() => {
            if (postStatus === 'idle') {
              dispatch(fetchPosts())
            }
          }, [postStatus, dispatch])
        correct_pattern: |
          export const fetchPosts = createAsyncThunk(
            'posts/fetchPosts',
            async () => client.get('/posts'),
            {
              condition(_arg, { getState }) {
                return selectPostsStatus(getState()) === 'idle'
              },
            },
          )
        source: '/home/weber/tmp/redux/docs/tutorials/essentials/part-5-async-logic.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current React development behavior; the bug often disappears in production, which makes it harder to diagnose.'
        skills:
          - 'debug-redux-toolkit-apps'
          - 'handle-side-effects'
      - mistake: 'Ignoring serializable-state warnings as harmless noise'
        mechanism: 'Non-serializable values can appear to work, but they break DevTools, persistence, replay, and equality assumptions in subtle ways.'
        wrong_pattern: |
          const initialState = {
            lastSeen: new Date(),
            pending: new Set(),
          }
        correct_pattern: |
          const initialState = {
            lastSeenIso: new Date().toISOString(),
            pendingIds: [] as string[],
          }
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; docs/usage/usage-guide.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current invariant; exceptions only apply when middleware intercepts values before reducers.'
      - mistake: 'Selecting broad slice state in parents and threading it through props'
        mechanism: 'Selecting whole slices or pulling lots of state into a parent component widens the subscription surface and forces rerenders through prop chains. React-Redux works better when components select only the values they use, as close to usage as possible.'
        wrong_pattern: |
          function PostsPage() {
            const postsState = useAppSelector((state) => state.posts)
            return <PostsList items={postsState.items} status={postsState.status} />
          }
        correct_pattern: |
          function PostsList() {
            const items = useAppSelector(selectPosts)
            const status = useAppSelector(selectPostsStatus)
            return <PostsView items={items} status={status} />
          }
        source: '/home/weber/tmp/redux/docs/style-guide/style-guide.md; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current React-Redux guidance; subscribe narrowly and where data is actually used.'
      - mistake: 'Returning unstable objects from query selection logic'
        mechanism: 'RTK Query and useSelector rely on stable references; recreating arrays or objects in selectFromResult defeats memoization and forces rerenders.'
        wrong_pattern: |
          const result = api.useGetPostsQuery(undefined, {
            selectFromResult: ({ data = [] }) => ({
              posts: [...data],
            }),
          })
        correct_pattern: |
          const result = api.useGetPostsQuery(undefined, {
            selectFromResult: ({ data = [] }) => ({
              posts: data,
            }),
          })
        source: '/home/weber/tmp/redux/docs/tutorials/essentials/part-8-rtk-query-advanced.md; /home/weber/tmp/redux/docs/style-guide/style-guide.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current behavior; hook result selection stays efficient only when returned references remain stable.'

tensions:
  - name: 'Local simplicity vs global observability'
    skills:
      - 'modern-redux'
      - 'design-state-ownership'
    description: 'Moving state into Redux improves sharing, tooling, and event history, but over-globalizing UI-local state adds needless indirection and render churn.'
    implication: 'Agents that optimize only for Redux consistency tend to pull transient UI state into slices when local state would be simpler and safer.'
  - name: 'Normalized slice ownership vs document-cache convenience'
    skills:
      - 'build-slices-and-selectors'
      - 'adopt-rtk-query'
    description: 'Entity adapters encourage normalized client state, while RTK Query deliberately keeps document-style cache entries unless you transform them yourself.'
    implication: 'Agents often duplicate server data into Redux slices or try to force RTK Query into a fully normalized cache model without a real need.'
  - name: 'Imperative clarity vs reactive orchestration'
    skills:
      - 'handle-side-effects'
      - 'redux-dataflow'
    description: 'Thunks are straightforward for one-off workflows, but listeners fit better when logic must react to future actions or state transitions over time.'
    implication: 'Agents that only know thunks end up writing polling loops or effect-heavy components instead of event-driven listener workflows.'
  - name: 'Single API slice performance vs file-level modularity'
    skills:
      - 'adopt-rtk-query'
      - 'generate-rtk-query-from-openapi'
    description: 'RTK Query wants one API slice per base URL for invalidation and middleware performance, while large codebases want generated or split endpoint code in many files.'
    implication: 'Agents often create multiple createApi roots for organization, then lose invalidation behavior and introduce reducerPath conflicts.'

